<header class="site-header">
  <div class="inner">
    <a class="brand" routerLink="/" (click)="closeMenu()">
      <span class="brand-icon" aria-hidden="true">
        <app-icon name="BookOpenCheck" [size]="22" />
      </span>
      <span class="brand-text">
        <span class="wordmark">Mirath Guide</span>
        <span class="tagline">Understand. Calculate. Share fairly.</span>
      </span>
    </a>

    <nav class="nav-desktop" aria-label="Primary">
      @for (link of navLinks; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: false }"
          ariaCurrentWhenActive="page"
        >
          {{ link.label }}
        </a>
      }
    </nav>

    <div class="actions">
      <app-language-switcher class="lang-switcher" />
      <app-primary-button routerLink="/calculator/wizard" [showArrow]="false" class="start-btn">
        Start Calculation
      </app-primary-button>
      <button
        type="button"
        class="menu-toggle"
        (click)="toggleMenu()"
        [attr.aria-expanded]="menuOpen()"
        aria-controls="mobile-nav"
        aria-label="Toggle menu"
      >
        <app-icon [name]="menuOpen() ? 'X' : 'Menu'" [size]="22" />
      </button>
    </div>
  </div>

  @if (menuOpen()) {
    <nav id="mobile-nav" class="nav-mobile" aria-label="Primary mobile">
      @for (link of navLinks; track link.path) {
        <a [routerLink]="link.path" routerLinkActive="active" (click)="closeMenu()">{{ link.label }}</a>
      }
      <app-language-switcher />
      <app-primary-button routerLink="/calculator/wizard" [fullWidth]="true" (click)="closeMenu()">
        Start Calculation
      </app-primary-button>
    </nav>
  }
</header>
